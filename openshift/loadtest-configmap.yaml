apiVersion: v1
kind: ConfigMap
metadata:
  name: locust-loadtest-config
  labels:
    app: locust-loadtest
data:
  TARGET_HOST: "https://web-image-backend-bartadani-dev.apps.okd.fured.cloud.bme.hu"
  LOADTEST_PASSWORD: "LoadTest123!"
  LOADTEST_USERNAME_PREFIX: "openshift-user"
  LOADTEST_USER_INDEX_MOD: "5000"
  WAIT_MIN_SECONDS: "0.2"
  WAIT_MAX_SECONDS: "1.0"
  WEIGHT_LIST: "12"
  WEIGHT_GET: "8"
  WEIGHT_UPLOAD: "2"
  WEIGHT_UPDATE: "0"
  WEIGHT_DELETE: "1"
  # 1500-user ramp profile
  LOCUST_USERS: "150"
  LOCUST_SPAWN_RATE: "10"
  LOCUST_RUN_TIME: "3m"
  RAMP_UP_USERS: "150"
  RAMP_UP_TIME: "1m"
  PEAK_USERS: "150"
  PEAK_TIME: "1m"
  RAMP_DOWN_TIME: "1m"
