name: Fured OpenShift

env:
  # 🖊️ EDIT your repository secrets to log into your OpenShift cluster and set up the context.
  # See https://github.com/redhat-actions/oc-login#readme for how to retrieve these values.
  # To get a permanent token, refer to https://github.com/redhat-actions/oc-login/wiki/Using-a-Service-Account-for-GitHub-Actions
  OPENSHIFT_SERVER: ${{ secrets.OPENSHIFT_SERVER_FURED }}
  OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN_FURED }}
  # 🖊️ EDIT to set the kube context's namespace after login. Leave blank to use your user's default namespace.
  OPENSHIFT_NAMESPACE: "bartadani-dev"


  FRONTEND_IMAGE: web-image-frontend
  BACKEND_IMAGE: web-image-backend

  IMAGE_REGISTRY: ghcr.io/dani05
  IMAGE_REGISTRY_USER: ${{ github.actor }}
  IMAGE_REGISTRY_PASSWORD: ${{ github.token }}

  IMAGE_TAGS: ""

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  openshift-ci-cd:
    # 🖊️ Uncomment this if you are using CRDA scan step above
    # needs: crda-scan
    name: Build and deploy to OpenShift
    runs-on: ubuntu-latest
    environment: production

    outputs:
      ROUTE: ${{ steps.deploy-and-expose.outputs.route }}
      SELECTOR: ${{ steps.deploy-and-expose.outputs.selector }}

    steps:
      - name: Check for required secrets
        uses: actions/github-script@v6
        with:
          script: |
            const secrets = {
              OPENSHIFT_SERVER: `${{ env.OPENSHIFT_SERVER }}`,
              OPENSHIFT_TOKEN: `${{ env.OPENSHIFT_TOKEN }}`,
            };
            
            const GHCR = "ghcr.io";
            if (`${{ env.IMAGE_REGISTRY }}`.startsWith(GHCR)) {
              core.info(`Image registry is ${GHCR} - no registry password required`);
            }
            else {
              core.info("A registry password is required");
              secrets["IMAGE_REGISTRY_PASSWORD"] = `${{ secrets.IMAGE_REGISTRY_PASSWORD }}`;
            }
            
            const missingSecrets = Object.entries(secrets).filter(([ name, value ]) => {
              if (value.length === 0) {
                core.error(`Secret "${name}" is not set`);
                return true;
              }
              core.info(`✔️ Secret "${name}" is set`);
              return false;
            });
            
            if (missingSecrets.length > 0) {
              core.setFailed(`❌ At least one required secret is not set in the repository. \n` +
                "You can add it using:\n" +
                "GitHub UI: https://docs.github.com/en/actions/reference/encrypted-secrets#creating-encrypted-secrets-for-a-repository \n" +
                "GitHub CLI: https://cli.github.com/manual/gh_secret_set \n" +
                "Also, refer to https://github.com/redhat-actions/oc-login#getting-started-with-the-action-or-see-example");
            }
            else {
              core.info(`✅ All the required secrets are set`);
            }

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Determine app name
        if: env.APP_NAME == ''
        run: |
          echo "APP_NAME=$(basename $PWD)" | tee -a $GITHUB_ENV

      - name: Determine image tags
        if: env.IMAGE_TAGS == ''
        run: |
          echo "IMAGE_TAGS=latest ${GITHUB_SHA::12}" | tee -a $GITHUB_ENV


        # Build frontend image (target=frontend)
      - name: Build frontend image
        id: build-frontend
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.FRONTEND_IMAGE }}
          tags: |
            latest
            ${{ github.sha }}
          context: .
          dockerfiles: ./Dockerfile
          extra-args: |
            --target frontend
            --build-arg REACT_APP_API_BASE_URL_ARG=${{ vars.BACKEND_URL_FURED }}
          platform: linux/amd64

        # Build backend image (target=backend)
      - name: Build backend image
        id: build-backend
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.BACKEND_IMAGE }}
          tags: |
            latest
            ${{ github.sha }}
          context: .
          dockerfiles: ./Dockerfile
          extra-args: |
            --target backend
          platform: linux/amd64


        # Push frontend to GHCR
      - name: Push frontend image to GHCR
        id: push-frontend
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ env.FRONTEND_IMAGE }}
          tags: |
            latest
            ${{ github.sha }}
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ env.IMAGE_REGISTRY_USER }}
          password: ${{ env.IMAGE_REGISTRY_PASSWORD }}

      - name: Push backend image to GHCR
        id: push-backend
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ env.BACKEND_IMAGE }}
          tags: |
            latest
            ${{ github.sha }}
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ env.IMAGE_REGISTRY_USER }}
          password: ${{ env.IMAGE_REGISTRY_PASSWORD }}


        # The path the image was pushed to is now stored in ${{ steps.push-image.outputs.registry-path }}

      - name: Install oc
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: 4

      # https://github.com/redhat-actions/oc-login#readme
      - name: Log in to OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ env.OPENSHIFT_SERVER }}
          openshift_token: ${{ env.OPENSHIFT_TOKEN }}
          insecure_skip_tls_verify: true
          namespace: ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Apply JWT secret
        run: |
          oc create secret generic backend-jwt \
            --from-literal=SECURITY_JWT_SECRET_KEY='${{ secrets.JWT_SECRET_KEY }}' \
            --dry-run=client -o yaml | oc apply -f -  
        
      - name: Deploy PostgreSQL
        run: |
          NS="${{ env.OPENSHIFT_NAMESPACE }}"
          # Clean up old template-based resources only if they have the wrong selector
          if oc -n "$NS" get deploy postgresql -o jsonpath='{.spec.selector.matchLabels.name}' 2>/dev/null | grep -q postgresql; then
            echo "Cleaning up old template-based PostgreSQL deployment..."
            oc -n "$NS" delete deploy postgresql --ignore-not-found
            oc -n "$NS" delete dc postgresql --ignore-not-found
            oc -n "$NS" delete svc postgresql --ignore-not-found
          fi
          oc -n "$NS" apply -f openshift/postgresql.yaml
          echo "Waiting for PostgreSQL to be ready..."
          oc -n "$NS" rollout status deploy/postgresql --timeout=120s

        # Deploy backend + service + route
      - name: Deploy backend
        run: |
          NS="${{ env.OPENSHIFT_NAMESPACE }}"
          APP="${{ env.BACKEND_IMAGE }}"
          IMG="${{ env.IMAGE_REGISTRY }}/${APP}:${{ github.sha }}"
          
          # Create PVC for uploaded images if it doesn't exist yet
          oc -n "$NS" get pvc uploads-pvc >/dev/null 2>&1 || oc -n "$NS" create -f - <<EOF
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: uploads-pvc
          spec:
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 5Gi
          EOF
          
          oc -n "$NS" get deploy "$APP" >/dev/null 2>&1 || oc -n "$NS" create deployment "$APP" --image="$IMG"
          oc -n "$NS" set image deploy/"$APP" "$APP"="$IMG"
          
          # Set Spring profile + DB credentials
          oc -n "$NS" set env deploy/"$APP" \
            SPRING_PROFILES_ACTIVE=openshift \
            SPRING_DATASOURCE_URL=jdbc:postgresql://postgresql:5432/webimage \
            SPRING_DATASOURCE_USERNAME=webimage \
            SPRING_DATASOURCE_PASSWORD=webimage
          
          # Mount the PVC at /uploads inside the backend container
          oc -n "$NS" set volume deploy/"$APP" \
            --add --overwrite \
            --name=uploads-storage \
            --type=persistentVolumeClaim \
            --claim-name=uploads-pvc \
            --mount-path=/uploads
          
          oc -n "$NS" expose deploy "$APP" --port=8080 --name="$APP" || true
          oc -n "$NS" get route "$APP" >/dev/null 2>&1 || oc -n "$NS" create route edge "$APP" --service="$APP" --port=8080
          oc -n "$NS" rollout status deploy/"$APP"


      - name: Deploy frontend
        id: deploy-and-expose
        run: |
          NS="${{ env.OPENSHIFT_NAMESPACE }}"
          APP="${{ env.FRONTEND_IMAGE }}"
          IMG="${{ env.IMAGE_REGISTRY }}/${APP}:${{ github.sha }}"
          
          oc -n "$NS" get deploy "$APP" >/dev/null 2>&1 || oc -n "$NS" create deployment "$APP" --image="$IMG"
          oc -n "$NS" set image deploy/"$APP" "$APP"="$IMG"
          oc -n "$NS" expose deploy "$APP" --port=8080 --name="$APP" || true
          oc -n "$NS" get route "$APP" >/dev/null 2>&1 || oc -n "$NS" create route edge "$APP" --service="$APP" --port=8080
          oc -n "$NS" rollout status deploy/"$APP"

      - name: Print application URLs
        run: |
          NS="${{ env.OPENSHIFT_NAMESPACE }}"
          echo
          echo "Frontend Route:"
          oc -n "$NS" get route "${{ env.FRONTEND_IMAGE }}" -o jsonpath='{.spec.host}{"\n"}' || true
          echo
          echo "Backend Route:"
          oc -n "$NS" get route "${{ env.BACKEND_IMAGE }}" -o jsonpath='{.spec.host}{"\n"}' || true
