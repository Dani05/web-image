name: Run Locust load test on OpenShift

on:
  workflow_dispatch:

jobs:
  locust-loadtest:
    runs-on: ubuntu-latest

    env:
      # These must be set as GitHub Secrets in the repo or org
      OPENSHIFT_SERVER: ${{ secrets.OPENSHIFT_SERVER_FURED }}
      OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN_FURED }}
      OPENSHIFT_NAMESPACE: "app-tester"
      IMAGE_REGISTRY: ghcr.io/dani05
      IMAGE_REGISTRY_USER: ${{ github.actor }}
      IMAGE_REGISTRY_PASSWORD: ${{ github.token }}
      IMAGE_NAME: "web-image-locust"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to image registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ env.IMAGE_REGISTRY_USER }}
          password: ${{ env.IMAGE_REGISTRY_PASSWORD }}

      - name: Build and push Locust image
        uses: docker/build-push-action@v6
        with:
          context: ./loadtest
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Install oc CLI
        uses: redhat-actions/oc-installer@v1
        with:
          version: 'latest'

      - name: Login to OpenShift
        run: |
          oc login $OPENSHIFT_SERVER --token=$OPENSHIFT_TOKEN --insecure-skip-tls-verify=true
          oc project $OPENSHIFT_NAMESPACE

      - name: Update OpenShift manifests with image
        run: |
          IMAGE_FULL=${IMAGE_REGISTRY}/${IMAGE_NAME}:latest
          sed -i "s|ghcr.io/your-org/web-image-locust:latest|$IMAGE_FULL|g" openshift/loadtest-job.yaml
          sed -i "s|ghcr.io/your-org/web-image-locust:latest|$IMAGE_FULL|g" openshift/loadtest-ui.yaml

      - name: Apply ConfigMap
        run: |
          oc apply -f openshift/loadtest-configmap.yaml

      - name: Apply Locust UI
        run: |
          oc apply -f openshift/loadtest-ui.yaml

      - name: Start headless load test Job
        run: |
          oc delete job locust-loadtest-headless --ignore-not-found
          oc apply -f openshift/loadtest-job.yaml

      - name: Wait for Job to complete (with diagnostics)
        run: |
          set +e
          oc wait --for=condition=complete --timeout=1800s job/locust-loadtest-headless
          STATUS=$?
          set -e

          echo "oc wait exit code: $STATUS"
          echo "====== JOB DESCRIPTION ======"
          oc describe job locust-loadtest-headless || true

          echo "====== JOB PODS ======"
          oc get pods -l job-name=locust-loadtest-headless -o wide || true

          if [ $STATUS -ne 0 ]; then
            echo "Job did not complete in time. See description and pod list above."
            exit $STATUS
          fi

      - name: Show Job logs
        run: |
          oc logs job/locust-loadtest-headless

